name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Write wrangler.toml from secret
        env:
          WRANGLER_TOML: ${{ secrets.WRANGLER_TOML }}
        run: |
          if [ -z "$WRANGLER_TOML" ]; then
            echo "::error::WRANGLER_TOML secret is empty or missing"
            exit 1
          fi
          printf '%s' "$WRANGLER_TOML" > wrangler.toml

      - name: Build
        env:
          SITE_HOST: ${{ secrets.SITE_HOST }}
        run: npm run build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
